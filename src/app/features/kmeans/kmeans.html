<div class="flex-1 flex-col flex gap-4">
  <div class="flex items-center gap-4">
    <label class="text-sm">Clusters (k)</label>
    <input
      type="number"
      [ngModel]="k()"
      (ngModelChange)="onKChange($event)"
      [min]="MIN_K"
      [max]="MAX_K"
      class="w-16 bg-gray-800 text-white text-center rounded px-2 py-1"
    />
    <label class="text-sm">Shape</label>
    <select
      [ngModel]="shape()"
      (ngModelChange)="onShapeChange($event)"
      class="bg-gray-800 text-white rounded px-2 py-1 text-sm"
    >
      @for (s of SHAPES; track s.value) {
        <option [value]="s.value">{{ s.label }}</option>
      }
    </select>
    <button (click)="reset()">Reset</button>
    <button (click)="step()" [disabled]="state().converged">Step</button>
    <span class="text-sm text-gray-400">Iteration: {{ state().iteration }}</span>
  </div>
  <div>
    <canvas #canvas class="w-full"></canvas>
  </div>
</div>
