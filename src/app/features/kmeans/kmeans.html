<div class="max-w-4xl mx-auto flex-1 flex flex-col gap-3">
  <div>
    <h1>K-Means Clustering Visualization</h1>
    <hr />
  </div>
  <div class="flex flex-wrap md:flex-nowrap items-end gap-4">
    <label>
      <span>Clusters (k)</span>
      <input
        type="number"
        [ngModel]="k()"
        (ngModelChange)="onKChange($event)"
        [min]="MIN_K"
        [max]="MAX_K"
      />
    </label>
    <label>
      <span>Shape</span>
      <select
        [ngModel]="shape()"
        (ngModelChange)="onShapeChange($event)"
      >
        @for (s of SHAPES; track s.value) {
          <option [value]="s.value">{{ s.label }}</option>
        }
      </select>
    </label>
    <div class="flex items-center gap-4">
      <button (click)="reset()">Reset</button>
      <button (click)="step()" [disabled]="state().converged">Step</button>
      <span>Iteration: {{ state().iteration }}</span>
    </div>
  </div>
  <div>
    <canvas #canvas class="w-full"></canvas>
  </div>
</div>
